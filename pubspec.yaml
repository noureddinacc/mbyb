name: mbyb
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.32.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  flutter_riverpod: ^3.2.1
  hooks_riverpod: ^3.2.1
  flutter_hooks: ^0.21.3+1
  intl: ^0.20.2
  go_router: ^17.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/in/app-logo.png


flutter_icons:
  android: true
  ios: true
  image_path: assets/app-logo.png


flutter_native_splash:
  color: "#ffffff"
  image: assets/app-logo.png
  android_12:
    image: assets/app-logo.png
